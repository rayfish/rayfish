name: Feature request
description: Suggest a new capability or an improvement to an existing one.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that rayfish makes hard or impossible today?
      placeholder: When I run a fleet of servers, I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should rayfish do? A command sketch or example flow helps.
      placeholder: |
        e.g. `ray <new-command> ...` that does X
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you have tried, or other designs you weighed.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
