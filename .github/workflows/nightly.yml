name: Nightly

# Rolling pre-release built from every push to master. Moves the `nightly` tag
# to the new commit, recreates the `nightly` pre-release, and overwrites its
# Linux + macOS binaries. Consumed by `ray update --nightly`, which compares the
# published checksum against the running binary (not the version) to decide
# whether to swap — so a shared `0.x.y` across nightlies is fine.
on:
  push:
    branches:
      - master
  workflow_dispatch:

# Avoid two master pushes racing to move the tag / clobber assets.
concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  roll-tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so git-cliff can list commits since last stable.
          fetch-depth: 0

      - name: Move the nightly tag to this commit
        id: meta
        run: |
          SHA=$(git rev-parse --short=8 HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -f nightly
          git push -f origin nightly

      # Changes landed since the last stable vX.Y.Z (the `nightly` tag is not a
      # release boundary per cliff.toml's tag_pattern).
      - name: Generate changes-since-stable
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: Create / refresh the nightly pre-release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: nightly (${{ steps.meta.outputs.sha }})
          body: |
            Rolling nightly built from master @ ${{ steps.meta.outputs.sha }}. Install with `ray update --nightly`.

            ## Changes since the last stable release
            ${{ steps.notes.outputs.content }}
          prerelease: true

  build:
    needs: roll-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            name: ray-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            name: ray-linux-aarch64
          # Static builds: one binary that runs on any Linux regardless of glibc
          # version. Deps are musl-clean (ring + hickory, no C/dlopen deps).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            name: ray-linux-x86_64-musl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04-arm
            name: ray-linux-aarch64-musl
          - target: aarch64-apple-darwin
            runner: macos-latest
            name: ray-macos-aarch64
          - target: x86_64-apple-darwin
            # Cross-compiled on Apple Silicon (universal SDK); macos-13 Intel
            # runners are being retired and leave the job queued indefinitely.
            runner: macos-latest
            name: ray-macos-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl-gcc, needed for ring's C stubs when linking the static musl target.
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"
          cache-on-failure: true

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package for release
        run: |
          BINARY=target/${{ matrix.target }}/release/ray
          cp "$BINARY" ${{ matrix.name }}
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          else
            shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256
          fi

      - name: Upload nightly assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

  android:
    needs: roll-tag
    # 24.04 (glibc 2.39): the prebuilt cargo-ndk from install-action is linked
    # against glibc 2.39 and won't load on 22.04 (glibc 2.35). Safe here because
    # this job's output is Android-target (bionic .so + APK), so the host glibc
    # never becomes an end-user floor the way it does for the desktop binaries.
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android"
          cache-on-failure: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # Caches ~/.gradle/caches + ~/.gradle/wrapper (keyed on the Gradle
          # build files) so downloaded dependencies survive between runs.
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The NDK is ~1GB; cache it so we download it once per version instead of
      # on every run. sdkmanager below is a no-op on a cache hit.
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          key: android-ndk-27.2.12479018

      # Prebuilt binary via install-action instead of `cargo install`, which
      # would compile cargo-ndk from source on every run.
      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Install NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      # Gradle's cargoNdkBuild task only rebuilds the .so; the Kotlin bindings
      # are generated here so the checked-in copy can never drift from the APK.
      - name: Generate UniFFI bindings
        run: |
          cargo build -p ray-mobile
          cargo run -p ray-mobile --bin uniffi-bindgen -- generate \
            --library target/debug/libray_mobile.so \
            --language kotlin \
            --out-dir android/app/src/main/java

      - name: Build APK
        working-directory: android
        run: ./gradlew :app:assembleDebug

      # Debug-signed for now (installable by anyone) since there is no release
      # keystore yet. Swap to a signed assembleRelease once one exists.
      - name: Package APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk rayfish-android.apk
          sha256sum rayfish-android.apk > rayfish-android.apk.sha256

      - name: Upload nightly assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          files: |
            rayfish-android.apk
            rayfish-android.apk.sha256
