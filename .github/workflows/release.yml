name: Release

# Release binary builds are disabled for now — run manually via the Actions tab
# when ready. Re-enable automatic builds by uncommenting the tag trigger below.
on:
  # push:
  #   tags:
  #     - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.extract_version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "${{ steps.extract_version.outputs.tag }}" -m "Release ${{ steps.extract_version.outputs.tag }}" 2>/dev/null || true
          git push origin "${{ steps.extract_version.outputs.tag }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract_version.outputs.tag }}
          name: ${{ steps.extract_version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.extract_version.outputs.tag, '-') }}

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: runs-on=${{ github.run_id }}/runner=64cpu-linux-x64/image=ubuntu22-full-x64/extras=s3-cache
            name: ray-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: runs-on=${{ github.run_id }}/runner=64cpu-linux-arm64/image=ubuntu22-full-arm64/extras=s3-cache
            name: ray-linux-aarch64
          - target: aarch64-apple-darwin
            runner: macos-latest
            name: ray-macos-aarch64
          - target: x86_64-apple-darwin
            runner: macos-13
            name: ray-macos-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: runs-on/action@v2
        if: ${{ !contains(matrix.runner, 'macos') }}
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"
          cache-on-failure: true

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package for release
        run: |
          BINARY=target/${{ matrix.target }}/release/ray
          cp "$BINARY" ${{ matrix.name }}
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          else
            shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
