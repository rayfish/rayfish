[package]
name = "pitopi"
version = "0.1.0"
edition = "2024"

[features]
default = []
tor = ["dep:iroh-tor-transport"]

[dependencies]
anyhow = "1"
blake3 = { version = "1", features = ["serde"] }
bytes = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
dashmap = "6"
derive_more = { version = "2", features = ["is_variant"] }
dirs = "6.0.0"
futures = "0.3"
iroh = { version = "1", features = ["metrics", "unstable-custom-transports"] }
iroh-tor-transport = { version = "0.1", optional = true }
iroh-metrics = { version = "1", features = ["service", "metrics"] }
iroh-dns = "1"
iroh-blobs = { version = "0.103", default-features = false, features = ["fs-store"] }
iroh-mdns-address-lookup = "0.4"
humansize = "2"
mime_guess = "2"
rand = "0.10"
rmp-serde = "1"
libc = "0.2"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
tun = { version = "0.8.13", features = ["async"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1.1"
url = "2"
hex = "0.4.3"
simple-dns = "0.9"
smol_str = { version = "0.3.6", features = ["serde"] }
arc-swap = "1.9.1"
